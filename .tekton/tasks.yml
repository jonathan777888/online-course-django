apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  description: Clean up the workspace before running the pipeline.
  workspaces:
    - name: source
  steps:
    - name: remove-old-files
      image: alpine:latest
      script: |
        #!/bin/sh
        echo "Cleaning workspace..."
        rm -rf $(workspaces.source.path)/*
        echo "Workspace cleaned."

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose
spec:
  description: Run unit tests using nose.
  workspaces:
    - name: source
  steps:
    - name: run-nose-tests
      image: python:3.10
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        echo "Installing test dependencies..."
        python -m pip install --upgrade pip
        pip install nose
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

        echo "Running unit tests with nose..."
        nosetests
